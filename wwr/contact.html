<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Rio Verde Rafting</title>
    <meta name="description" content="Contact Rio Verde Rafting for questions about reservations, trips, or your upcoming white water adventure. Find our address, phone, email, and send us a message.">
    <meta name="author" content="Eduardo Ritter">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Rio Verde Rafting logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="contact-intro">
            <h1>Contact Rio Verde Rafting</h1>
            <address>
                482 Main Street<br>
                Salmon, ID 83467<br>
                <a href="tel:+12085551234">+1 (208) 555-1234</a><br>
                <a href="mailto:info@rioverderafting.com">info@rioverderafting.com</a>
            </address>
        </div>

        <div class="contact-grid">
            <div class="map-wrapper">
                <iframe
                    src="https://maps.google.com/maps?q=482%20Main%20Street%2C%20Salmon%2C%20ID%2083467&t=&z=13&ie=UTF8&iwloc=&output=embed"
                    title="Map showing the location of Rio Verde Rafting"
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <form class="contact-form">
                <div class="form-item">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" autocomplete="name" required>
                </div>
                <div class="form-item">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" autocomplete="email" required>
                </div>
                <fieldset class="purpose">
                    <legend>Message Purpose</legend>
                    <label><input type="radio" name="purpose" value="general" checked> General Inquiry</label>
                    <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label>
                    <label><input type="radio" name="purpose" value="suggestion"> Website Suggestion</label>
                </fieldset>
                <div class="form-item">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <div class="form-item checkbox-item">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Please subscribe me to the monthly newsletter</label>
                </div>
                <button type="submit">Get in Touch</button>
            </form>
        </div>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <div class="employee-row">
                <figure>
                    <img src="images/employee1.svg" alt="Portrait of Marina Costa">
                    <figcaption>Marina Costa<br><span>Head River Guide</span></figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.svg" alt="Portrait of Diego Alves">
                    <figcaption>Diego Alves<br><span>Safety Coordinator</span></figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.svg" alt="Portrait of Sara Kim">
                    <figcaption>Sara Kim<br><span>Guest Experience Manager</span></figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy;2026 Rio Verde Rafting &#10070; Eduardo Ritter</p>
        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank" rel="noopener noreferrer"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="https://x.com" target="_blank" rel="noopener noreferrer"><img src="images/twitter.png" alt="X (Twitter)"></a>
            <a href="https://instagram.com" target="_blank" rel="noopener noreferrer"><img src="images/instagram.png" alt="Instagram"></a>
        </nav>
    </footer>
</body>
</html>
